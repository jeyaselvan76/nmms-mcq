<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMMS Student Portal | www.tnclassroom.com</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-slate-50 antialiased min-h-screen p-4">

    <div class="max-w-md mx-auto text-center mb-6">
        <h1 class="text-xl font-black text-[#1e3a8a] tracking-wider uppercase">NMMS Result Portal</h1>
        <p class="text-xs font-bold text-slate-400">WWW.TNCLASSROOM.COM</p>
    </div>

    <div id="search-card" class="max-w-md mx-auto bg-white rounded-[2rem] p-6 shadow-xl border border-slate-100 mb-6">
        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 tracking-widest">Student EMIS ID</label>
                <input type="text" id="searchEmis" maxlength="10" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none border-2 border-transparent focus:border-blue-900 transition" placeholder="Enter 10-Digit EMIS ID">
            </div>
            <button onclick="fetchStudentResults()" class="w-full bg-[#1e3a8a] text-white py-4 rounded-xl font-black tracking-wide shadow-lg hover:bg-blue-900 transition uppercase text-sm">Find My Marks</button>
        </div>
    </div>

    <div id="results-zone" class="max-w-md mx-auto space-y-4 hidden">
        <h2 class="text-xs font-black uppercase tracking-widest text-slate-400 px-2">Your Performance History</h2>
        <div id="history-list" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBW92t7GWAf6vIHdJ83n7Nz7Io3y2GArVw",
            authDomain: "tnclassroom-mcq-new.firebaseapp.com",
            projectId: "tnclassroom-mcq-new",
            storageBucket: "tnclassroom-mcq-new.firebasestorage.app",
            messagingSenderId: "808928665241",
            appId: "1:808928665241:web:5a8a9e3f4ee5b885c9a208"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.fetchStudentResults = async function() {
            const emisId = document.getElementById('searchEmis').value.trim();
            if(emisId.length !== 10) return alert("Please enter a valid 10-digit EMIS ID.");

            const list = document.getElementById('history-list');
            list.innerHTML = '<p class="text-center text-sm font-bold text-slate-400 py-6">Connecting to Firestore Database...</p>';
            document.getElementById('results-zone').classList.remove('hidden');

            try {
                // Queries the mobile field (storing EMIS ID) and sorts via our created Firestore Composite Index
                const q = query(
                    collection(db, "results"), 
                    where("mobile", "==", emisId),
                    orderBy("timestamp", "desc")
                );
                
                const querySnapshot = await getDocs(q);
                list.innerHTML = '';

                if(querySnapshot.empty) {
                    list.innerHTML = '<p class="text-center text-sm font-bold text-red-500 py-6">No exam records found for this EMIS ID.</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const res = doc.data();
                    const dateObj = res.timestamp ? res.timestamp.toDate().toLocaleDateString() : 'N/A';
                    const percentage = Math.round((res.score / res.total) * 100);
                    
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex flex-col gap-2";
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-black text-slate-800 text-sm uppercase">${res.quizId ? res.quizId.replace(/_/g, ' ') : 'NMMS QUIZ'}</h3>
                                <p class="text-[10px] text-slate-400 font-bold">${dateObj} | PW Used: <span class="text-blue-900">${res.password || 'N/A'}</span></p>
                            </div>
                            <span class="text-xl font-black ${percentage >= 40 ? 'text-green-600' : 'text-amber-500'}">${res.score}/${res.total}</span>
                        </div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden mt-1">
                            <div class="${percentage >= 40 ? 'bg-green-500' : 'bg-amber-500'} h-full" style="width: ${percentage}%"></div>
                        </div>
                    `;
                    list.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                list.innerHTML = `<div class="p-4 bg-red-50 rounded-xl border border-red-200 text-xs font-bold text-red-700">
                    <strong>Query Blocked:</strong> Ensure you have clicked the Firebase Console link generated in your inspector logs to enable your Composite Index!
                </div>`;
            }
        }
    </script>
</body>
</html>
